services:
  ai-delver-intelligence:
    image: ai-delver-intelligence:dev
    container_name: ai-delver-intelligence
    build:
      context: .
      dockerfile: intelligence/docker/Dockerfile
      target: builder-dev
      args:
        BASE_IMAGE: ${BASE_IMAGE:-rust:1.85-bookworm}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /app/intelligence
    user: "${UID}:${GID}"
    shm_size: ${AI_SHM_SIZE:-2g}
    volumes:
      - ./intelligence:/app/intelligence
      - ./level:/app/level
      - ./runtime:/app/runtime
      - ./client/data/level_saves:/app/client/data/level_saves:ro
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - intelligence-target:/app/intelligence/intelligence_rs/target
    environment:
      - LIBTORCH_USE_PYTORCH=1
      - AI_BATCH_SIZE=${AI_BATCH_SIZE:-38}
      - CONTAINER_COMMAND
    command: sh -c "${CONTAINER_COMMAND}"
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${AI_MEMORY_LIMIT:-12G}

volumes:
  cargo-registry:
  cargo-git:
  intelligence-target:
