services:
  ai-delver-intelligence:
    image: ai-delver-intelligence:dev
    container_name: ai-delver-intelligence
    build:
      context: .
      dockerfile: intelligence/docker/Dockerfile
      target: builder-dev
      args:
        BASE_IMAGE: ${BASE_IMAGE:-rust:1.88-bookworm}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    working_dir: /app/intelligence
    # Entrypoint starts as root to chown named volumes, then drops to HOST_UID.
    user: "0:0"
    shm_size: ${AI_SHM_SIZE:-2g}
    volumes:
      - ./intelligence:/app/intelligence
      - ./level:/app/level
      - ./runtime:/app/runtime
      - ./client/data/level_saves:/app/client/data/level_saves:ro
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - intelligence-target:/app/intelligence/target
    environment:
      - LIBTORCH_USE_PYTORCH=1
      - LIBTORCH_BYPASS_VERSION_CHECK=1
      - LD_LIBRARY_PATH=/opt/torch-lib
      - HOST_UID=${UID:-1000}
      - HOST_GID=${GID:-1000}
      - AI_BATCH_SIZE=${AI_BATCH_SIZE:-38}
      - TRAIN_ARGS
    # eval re-parses quotes inside TRAIN_ARGS so "Ai Test #1" stays one clap argument.
    # $$ becomes $ in the container (Compose escaping).
    command:
      - sh
      - -c
      - cargo build --release --manifest-path Cargo.toml && eval "cargo run --release --manifest-path Cargo.toml -- $$TRAIN_ARGS"
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${AI_MEMORY_LIMIT:-12G}

volumes:
  cargo-registry:
  cargo-git:
  intelligence-target:
